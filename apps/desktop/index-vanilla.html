<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cortex</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://cdn.teller.io; connect-src 'self' http://localhost:3000 http://localhost:* https://api.teller.io ws://localhost:* wss://localhost:*; frame-src https://cdn.teller.io; img-src 'self' data: https:;" />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="./dist-vanilla/renderer.js" as="script" />
    
    <!-- Styles -->
    <style>
      /* Critical CSS inlined for fast first paint */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      html, body, #app {
        height: 100%;
        overflow: hidden;
      }
      
      body {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Initial loading state */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        background: hsl(0 0% 100%);
      }
      
      .dark .app-loading {
        background: hsl(240 10% 3.9%);
      }
      
      .app-loading .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid hsl(240 5.9% 90%);
        border-top-color: hsl(240 5.9% 10%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      .dark .app-loading .spinner {
        border-color: hsl(240 3.7% 15.9%);
        border-top-color: hsl(0 0% 98%);
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Hide content until JS loads */
      .app-content {
        display: none;
      }
      
      .app-ready .app-loading {
        display: none;
      }
      
      .app-ready .app-content {
        display: block;
        height: 100%;
      }
    </style>
    
    <!-- Full Tailwind styles (loaded async) -->
    <link rel="stylesheet" href="./src/styles/global.css" />
  </head>
  <body>
    <div id="app">
      <!-- Loading state shown until JS initializes -->
      <div class="app-loading">
        <div class="spinner"></div>
      </div>
      
      <!-- App content container -->
      <div class="app-content"></div>
    </div>
    
    <!-- Main renderer script -->
    <script type="module" src="./dist-vanilla/renderer.js"></script>
    
    <!-- Mark app as ready once script loads -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // App will mark itself ready after initialization
        window.__markAppReady = function() {
          document.body.classList.add('app-ready');
        };
      });
    </script>
  </body>
</html>
